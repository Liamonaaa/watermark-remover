<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מסיר סימני מים</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1>מסיר סימני מים</h1>
    <p class="subtitle">100% בדפדפן · ללא AI · ללא הרשמה</p>
  </header>

  <section class="upload-section" id="uploadSection">
    <div id="dropZone" class="drop-zone">
      <input type="file" id="fileInput" accept="image/*" hidden>
      <div class="drop-content">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>גרור תמונה או לחץ לבחירה</p>
        <p class="small">PNG, JPG, WEBP</p>
      </div>
    </div>
  </section>

  <section class="editor hidden" id="editorSection">
    <div class="workflow">
      <div class="step">
        <span class="step-num">1</span>
        <button id="setSourceBtn" class="btn btn-secondary">סמן אזור מקור נקי</button>
        <span id="sourceStatus" class="source-status">לא נבחר מקור</span>
      </div>
      <div class="step">
        <span class="step-num">2</span>
        <span class="step-text">לחץ על סימן המים בתמונה — האתר יזהה ויסיר אותו אוטומטית</span>
      </div>
    </div>

    <div class="controls-panel">
      <div class="tool-group">
        <label>טולרנס זיהוי</label>
        <input type="range" id="wandTolerance" min="5" max="80" value="25">
        <span id="wandToleranceVal">25</span>
      </div>
      <div class="tool-group">
        <label>הרחבת אזור</label>
        <input type="range" id="maskDilate" min="0" max="20" value="3">
        <span id="maskDilateVal">3</span>
      </div>
      <div class="tool-group">
        <label>ריכוך קצוות</label>
        <input type="range" id="featherSize" min="0" max="20" value="5">
        <span id="featherSizeVal">5</span>
      </div>
      <div class="tool-group">
        <label>
          <input type="checkbox" id="wandContiguous" checked>
          רק אזור מחובר
        </label>
      </div>
      <div class="tool-group">
        <button id="undoBtn" class="btn btn-secondary">בטל</button>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="imgCanvas"></canvas>
      <canvas id="maskCanvas"></canvas>
    </div>

    <div class="actions">
      <button id="downloadBtn" class="btn btn-primary hidden">הורד תוצאה</button>
      <button id="resetBtn" class="btn btn-secondary">תמונה חדשה</button>
    </div>

    <div id="status" class="status hidden"></div>
  </section>

  <footer>
    <p>שימוש בתמונות שלך בלבד. הסרת סימני מים מתוכן זר עלולה להפר זכויות יוצרים.</p>
    <p class="small">Magic Wand + Clone Stamp · ללא העלאה לשרת</p>
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
